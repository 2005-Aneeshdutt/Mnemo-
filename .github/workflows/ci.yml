name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest
        env:
          GROQ_API_KEY: pytest_dummy_gsk_ci_xxxxxxxxxxxxxxxxxxxxxxxxxxxx
          MNEMO_DB_PATH: ${{ runner.temp }}/mnemo_test.db
          MNEMO_API_KEY: ""
        run: pytest -q
